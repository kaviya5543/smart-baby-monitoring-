<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Baby Monitor - Camera & Audio</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="/socket.io/socket.io.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/speech-commands"></script>
</head>
<body>


    <!-- Monitor Content -->
    <div id="monitor-content" class="container fade-in">
        <header class="page-header">
            <a href="/index.html" class="btn outline-btn back-btn">&larr; Back Home</a>
            <h1>Baby Monitor</h1>
            <div id="status-badge" class="badge bg-green">
                <span class="pulse-dot"></span> Monitoring Baby...
            </div>
        </header>

        <main class="monitor-main">
            <div class="video-container">
                <video id="baby-video" autoplay muted playsinline></video>
                <div class="video-overlay">
                    <span id="motion-indicator" class="indicator hidden">Movement Detected</span>
                    <span id="audio-indicator" class="indicator hidden">Cry Detected</span>
                </div>
                <!-- Hidden canvas for movement detection -->
                <canvas id="video-canvas" class="hidden"></canvas>
            </div>
            
            <div class="controls-card">
                <h3>Detection Status</h3>
                <div class="status-grid">
                    <div class="status-item">
                        <span class="label">Camera Stream:</span>
                        <span id="cam-status" class="value success">Initializing...</span>
                    </div>
                    <div class="status-item">
                        <span class="label">Mic Stream:</span>
                        <span id="mic-status" class="value success">Initializing...</span>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Script included at end -->
    <script src="baby.js"></script>
</body>
</html>
